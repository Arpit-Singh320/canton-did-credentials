name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM (Daml Package Manager)
        run: curl https://get.digitalasset.com/install/install.sh | sh
        shell: bash

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH
        shell: bash

      - name: Verify DPM installation
        run: dpm --version

      - name: Build Daml Contracts
        working-directory: ./daml
        run: dpm build

      - name: Run Daml Tests
        working-directory: ./daml
        run: dpm test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK Dependencies
        working-directory: ./sdk
        run: npm ci

      - name: Build SDK
        working-directory: ./sdk
        run: npm run build

      - name: Lint SDK
        working-directory: ./sdk
        run: npm run lint

      - name: Test SDK
        working-directory: ./sdk
        run: npm test

      # This step assumes a script exists in sdk/package.json to validate
      # against the W3C specifications mentioned in docs/W3C_COMPLIANCE.md
      - name: Validate W3C Compliance
        working-directory: ./sdk
        run: npm run test:w3c-compliance